<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>121 Challenge Statistik - OcheMaster</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0c10; --card: #1c1f26; 
            --accent: #00d2ff; /* Hellblau für Statistik */
            --danger: #ff4757; --gold: #ffa502;
        }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: var(--accent); font-weight: bold; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }

        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        h2 { font-size: 0.75rem; text-transform: uppercase; opacity: 0.5; margin: 0 0 15px 0; letter-spacing: 1.5px; }
        
        .big-val { font-size: 3.5rem; font-weight: 900; color: var(--accent); line-height: 1; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-box label { display: block; font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box b { font-size: 1.4rem; color: white; }

        .chart-container { position: relative; height: 220px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="training_stats.html" class="back-btn">← ANALYTICS</a>
        <div style="text-align: right;">
            <div style="font-size: 0.6rem; opacity: 0.5;">BEST LEVEL</div>
            <div id="best-level" style="font-size: 1.5rem; font-weight: 900; color: var(--gold);">--</div>
        </div>
    </header>

    <div class="card" style="text-align: center;">
        <h2>Checkouts (Letzte Session)</h2>
        <div id="last-score" class="big-val">0/10</div>
        
        <div class="stat-grid">
            <div class="stat-box">
                <label>End-Level</label>
                <b id="last-level">-</b>
            </div>
            <div class="stat-box">
                <label>Quote</label>
                <b id="success-pct">0%</b>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Level-Verlauf (Entwicklung)</h2>
        <div class="chart-container">
            <canvas id="levelChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h2>Darts pro Checkout (Letzte 10)</h2>
        <div class="chart-container">
            <canvas id="dartsChart"></canvas>
        </div>
    </div>
</div>

<script>
    const storage = JSON.parse(localStorage.getItem('dart_training_stats') || '{}');
    const history = storage.checkout121 || [];

    if (history.length > 0) {
        const latest = history[history.length - 1];
        
        // Kopfdaten
        document.getElementById('last-score').innerText = `${latest.score}/10`;
        document.getElementById('last-level').innerText = latest.maxLevel;
        document.getElementById('success-pct').innerText = (latest.score * 10) + "%";
        
        const allLevels = history.map(h => h.maxLevel);
        const maxReached = Math.max(...allLevels);
        const minReached = Math.min(...allLevels);
        
        document.getElementById('best-level').innerText = maxReached;

        // --- CHART 1: Level-Trend (Langzeit) ---
        new Chart(document.getElementById('levelChart'), {
            type: 'line',
            data: {
                labels: history.map((_, i) => i + 1),
                datasets: [{
                    label: 'End-Level',
                    data: allLevels,
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#00d2ff'
                }]
            },
            options: {
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        // Verhindert das "Quetschen":
                        beginAtZero: false, 
                        min: Math.floor(minReached - 2), // Startet kurz unter dem schlechtesten Level
                        suggestedMax: maxReached + 2,
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { color: 'rgba(255,255,255,0.5)', stepSize: 1 } 
                    },
                    x: { 
                        ticks: { display: true, color: 'rgba(255,255,255,0.3)' }, 
                        grid: { display: false } 
                    }
                }
            }
        });

        // --- CHART 2: Darts pro Aufnahme ---
        const roundData = latest.details || [];
        const labels = roundData.map(d => d.target);
        const dartsCount = roundData.map(d => d.dartsUsed);

        new Chart(document.getElementById('dartsChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Darts',
                    data: dartsCount,
                    backgroundColor: roundData.map(d => d.success ? 'rgba(0, 210, 255, 0.6)' : 'rgba(255, 71, 87, 0.4)'),
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: 9, 
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { color: 'rgba(255,255,255,0.5)', stepSize: 1 } 
                    },
                    x: { 
                        grid: { display: false }, 
                        ticks: { color: 'white', font: { size: 10 } } 
                    }
                }
            }
        });
    }
</script>

</body>
</html>
