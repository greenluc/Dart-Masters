<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Bull-Off | 75 Percent Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');

        body {
            background: radial-gradient(circle at center, #15191d 0%, #050505 100%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Zentriert die Hauptgruppen */
            height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* --- HEADER BEREICH --- */
        .top-container {
            text-align: center;
            z-index: 10;
            margin-bottom: 15px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin: 0;
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 20px;
            border-radius: 30px;
            margin-top: 10px;
            display: inline-block;
        }

        #status {
            font-size: 1rem;
            text-transform: uppercase;
            color: #00a8ff;
            letter-spacing: 1px;
        }

        /* --- BOARD BEREICH (75% SIZE) --- */
        #board-container {
            width: 75vmin;  /* 75% der kleinsten Bildschirmseite (Höhe oder Breite) */
            height: 75vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 15px 40px rgba(0,0,0,0.8));
            cursor: crosshair;
        }

        /* --- BUTTON BEREICH --- */
        .bottom-container {
            height: 80px; /* Fester Platzhalter für den Button */
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-ready {
            display: none;
            padding: 12px 40px;
            background: #2ed573;
            color: black;
            border: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.3);
            transition: 0.2s;
        }

        .btn-ready:hover {
            transform: scale(1.05);
            background: #fff;
        }

        /* Dart Animation */
        .dart-marker { 
            animation: impact 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        @keyframes impact { 
            from { transform: scale(5); opacity: 0; } 
            to { transform: scale(1); opacity: 1; } 
        }
    </style>
</head>
<body>

    <div class="top-container">
        <div class="header"><h1>BULL-OFF</h1></div>
        <div class="info-panel"><div id="status">Markiere deinen Treffer</div></div>
    </div>

    <div id="board-container">
        <svg id="dartboard" viewBox="0 0 200 200"></svg>
    </div>

    <div class="bottom-container">
        <button id="btn-go" class="btn-ready" onclick="finish()">Game On!</button>
    </div>

    <script>
        const svg = document.getElementById('dartboard');
        const numbers = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
        let canThrow = true;
        let pDist = 0;

        function initBoard() {
            // Außenring
            drawCircle(100, 100, 98, "#000", "#333", 0.5);
            
            numbers.forEach((num, i) => {
                const angle = (i * 18) - 99;
                const r1 = Math.PI * angle / 180;
                const r2 = Math.PI * (angle + 18) / 180;

                const cS1 = (i % 2 === 0) ? "#1a1a1a" : "#e0e0e0"; 
                const cS2 = (i % 2 === 0) ? "#d63031" : "#27ae60"; 

                drawSegment(82, 91, r1, r2, cS2); // Double
                drawSegment(55, 82, r1, r2, cS1); // Outer Single
                drawSegment(48, 55, r1, r2, cS2); // Triple
                drawSegment(14, 48, r1, r2, cS1); // Inner Single

                const txtA = r1 + (Math.PI * 9 / 180);
                const tx = 100 + 94.5 * Math.cos(txtA);
                const ty = 100 + 94.5 * Math.sin(txtA);
                const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t.setAttribute("x", tx); t.setAttribute("y", ty);
                t.setAttribute("fill", "white"); t.setAttribute("font-size", "7.5");
                t.setAttribute("text-anchor", "middle"); t.setAttribute("alignment-baseline", "middle");
                t.style.fontFamily = "'Orbitron', sans-serif";
                t.textContent = num;
                svg.appendChild(t);
            });

            drawCircle(100, 100, 14, "#27ae60", "#111", 0.3); // Single Bull
            drawCircle(100, 100, 6, "#d63031", "#111", 0.3);  // Bullseye
            
            svg.addEventListener('click', handleThrow);
        }

        function drawSegment(rIn, rOut, a1, a2, color) {
            const x1 = 100 + rOut * Math.cos(a1), y1 = 100 + rOut * Math.sin(a1);
            const x2 = 100 + rOut * Math.cos(a2), y2 = 100 + rOut * Math.sin(a2);
            const x3 = 100 + rIn * Math.cos(a2), y3 = 100 + rIn * Math.sin(a2);
            const x4 = 100 + rIn * Math.cos(a1), y4 = 100 + rIn * Math.sin(a1);
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M${x1},${y1} A${rOut},${rOut} 0 0,1 ${x2},${y2} L${x3},${y3} A${rIn},${rIn} 0 0,0 ${x4},${y4} Z`);
            path.setAttribute("fill", color);
            path.setAttribute("stroke", "#444");
            path.setAttribute("stroke-width", "0.4");
            svg.appendChild(path);
        }

        function drawCircle(cx, cy, r, fill, stroke, sw) {
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", r);
            c.setAttribute("fill", fill); c.setAttribute("stroke", stroke);
            c.setAttribute("stroke-width", sw);
            svg.appendChild(c);
        }

        function handleThrow(e) {
            if(!canThrow) return;
            const pt = svg.createSVGPoint();
            pt.x = e.clientX; pt.y = e.clientY;
            const loc = pt.matrixTransform(svg.getScreenCTM().inverse());
            
            pDist = Math.sqrt(Math.pow(loc.x - 100, 2) + Math.pow(loc.y - 100, 2));
            renderDart(loc.x, loc.y, "#00a8ff");
            
            canThrow = false;
            document.getElementById('status').innerText = "KI wirft...";
            setTimeout(aiThrow, 1000);
        }

        function aiThrow() {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 38; // Simulation KI-Wurf
            const x = 100 + Math.cos(angle) * dist;
            const y = 100 + Math.sin(angle) * dist;
            const aDist = Math.sqrt(Math.pow(x - 100, 2) + Math.pow(y - 100, 2));
            
            renderDart(x, y, "#ff4757");
            
            const status = document.getElementById('status');
            if(pDist < aDist) {
                status.innerHTML = "DU GEWINNST!";
                status.style.color = "#2ed573";
                localStorage.setItem('match_starter', 'user');
            } else {
                status.innerHTML = "KI GEWINNT!";
                status.style.color = "#ff4757";
                localStorage.setItem('match_starter', 'ai');
            }
            document.getElementById('btn-go').style.display = "block";
        }

        function renderDart(x, y, color) {
            const d = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            d.setAttribute("cx", x); d.setAttribute("cy", y); d.setAttribute("r", "3.5");
            d.setAttribute("fill", color); d.setAttribute("class", "dart-marker");
            d.setAttribute("stroke", "white"); d.setAttribute("stroke-width", "0.8");
            svg.appendChild(d);
        }

        function finish() { window.location.href = 'game.html'; }

        initBoard();
    </script>
</body>
</html>
