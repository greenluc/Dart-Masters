<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PDC Tournament Bracket</title>
    <style>
        :root {
            --sidebar-width: 80px;
            --accent: #2ecc71;
            --bg: #0f1116;
            --card-bg: #1c1f26;
            --round-gap: 50px;
            --gold: #f1c40f;
            --danger: #ff4757;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR STYLES (Synchronisiert) --- */
        .sidebar {
            width: var(--sidebar-width); background: #07080a;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; border-right: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
            height: 100%;
        }
        .nav-icon {
            width: 50px; height: 50px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer; transition: 0.3s;
            background: rgba(255,255,255,0.03); text-decoration: none; 
            color: white; font-size: 1.2rem;
        }
        .nav-icon:hover, .nav-icon.active { 
            background: var(--accent); color: #000; 
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 30px; overflow: hidden; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Bracket Styling */
        #bracket-display {
            display: flex; gap: var(--round-gap); overflow-x: auto;
            padding-bottom: 20px; flex: 1; align-items: flex-start;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        
          .round { 
        display: flex; flex-direction: column; 
        justify-content: flex-start; /* Oben beginnen f³r besseres Scrolling */
        min-width: 220px; 
        height: 100%;
        flex-shrink: 0;
        overflow-y: auto; /* Erlaubt vertikales Scrollen in langen Spalten */
        scrollbar-width: none; 
    }
    .round::-webkit-scrollbar { display: none; }

        .round-title {
            text-align: center; color: var(--accent); font-weight: bold;
            text-transform: uppercase; margin-bottom: 15px; font-size: 0.75rem; letter-spacing: 1px;
            position: sticky; top: 0; background: var(--bg); padding: 5px; z-index: 10;
        }

        .match-wrap { margin: 5px 0; width: 100%; }
        
        .match-card {
            background: var(--card-bg); border-radius: 6px; padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;
            font-size: 0.85rem;
        }
        .match-card.is-player-match { border: 1px solid var(--accent); background: rgba(46, 204, 113, 0.05); }
        .match-card.completed { opacity: 0.5; }
        
        .player-line { display: flex; justify-content: space-between; padding: 2px 0; }
        .player-name { opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
        .player-score { font-weight: bold; min-width: 20px; text-align: right; }
        .winner .player-name { color: var(--accent); font-weight: bold; opacity: 1; }

        .btn-action {
            padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-action:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-action.primary { background: var(--accent); color: black; }
        .btn-action.secondary { background: rgba(255,255,255,0.1); color: white; }

        #prize-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.92); z-index:2000; 
            display:none; flex-direction:column; align-items:center; justify-content:center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 3000;
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
}

.modal-card {
    background: var(--card-bg); padding: 40px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1); text-align: center;
    max-width: 400px; width: 90%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.modal-icon { font-size: 3rem; margin-bottom: 20px; }
.modal-card h2 { margin: 0 0 10px 0; color: var(--accent); }
.modal-card p { opacity: 0.7; line-height: 1.5; margin-bottom: 30px; }

.modal-actions { display: flex; gap: 15px; }
.modal-actions button { flex: 1; padding: 12px; }

    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="header">
        <div class="header-left">
            <h1 id="tournament-title" style="margin:0; font-size: 1.4rem;">Turnier Name</h1>
            <div id="tournament-info" style="opacity: 0.5; font-size: 0.8rem;">Modus lõdt...</div>
        </div>
        <div class="header-actions">
            <button id="btn-cheat-sim" class="btn-action" style="background: #f1c40f; color: black; margin-right: 5px;" onclick="cheatSimTournament()">Sieg erzwingen</button>
            <button id="btn-simulate-all" class="btn-action secondary" onclick="simulateAIOnly()">KI simulieren</button>
            <button id="btn-start-user" class="btn-action primary" onclick="findAndStartUserMatch()">Mein Spiel starten</button>
            <button id="btn-next-round" class="btn-action primary" style="display:none; background: #3498db; color: white;">Nõchste Runde</button>
        </div>
    </div>
    <div id="bracket-display"></div>
</div>
<div id="resume-modal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-icon"></div>
        <h2>Turnier gefunden</h2>
        <p>Du hast bereits ein laufendes Bracket f³r dieses Event. Wie m÷chtest du fortfahren?</p>
        <div class="modal-actions">
            <button class="btn-action primary" onclick="handleResumeDecision(true)">Fortsetzen</button>
            <button class="btn-action secondary" onclick="handleResumeDecision(false)">Neustart</button>
        </div>
    </div>
</div>

<div id="prize-overlay">
    <div style="background: var(--card-bg); padding: 50px; border-radius: 24px; text-align:center; border: 1px solid var(--accent); box-shadow: 0 0 50px rgba(46, 204, 113, 0.2);">
        <h2 id="prize-title" style="margin-top: 0; letter-spacing: 2px;">TURNIER BEENDET</h2>
        <p style="opacity: 0.6;">Dein gewonnenes Preisgeld:</p>
        <div id="prize-amount" style="font-size: 4rem; font-weight: 900; color: #f1c40f; margin: 10px 0;">Ż0</div>
        <button class="btn-action primary" style="width: 100%; padding: 15px;" onclick="saveAndGoHome()">ZUR▄CK ZUM HUB</button>
    </div>
</div>

<script src="sidebar_config.js"></script>
<script src="player_db.js"></script>
<script src="career_data.js"></script>
<script src="career_logic.js"></script> 
<script src="uk_open_engine.js"></script> 
<script src="bracket_engine.js"></script> 

</body>
</html>
