<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Dart Master - Ultimate Glow</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff88; 
            --glow-color: rgba(0, 255, 136, 0.9);
            --bg: #010101;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .app-header {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .board-container {
            position: absolute;
            bottom: -650px; 
            width: 93vw;
            max-width: 1200px;
            aspect-ratio: 1/1;
        }

        .num-text { 
            fill: #fff;
            font-size: 6px; 
            font-weight: 700;
            text-anchor: middle;
            filter: drop-shadow(0 0 1px var(--neon)) 
                    drop-shadow(0 0 1px var(--neon)) 
                    drop-shadow(0 0 12px var(--glow-color));
        }

        .spider-line {
            fill: none;
            stroke: var(--neon);
            stroke-width: 0.6;
            opacity: 0.9;
            filter: drop-shadow(0 0 3px var(--neon));
        }

        .spider-core {
            fill: none;
            stroke: #fff;
            stroke-width: 0.15;
            opacity: 0.7;
        }

        .nav-group { cursor: pointer; pointer-events: all; }
        .nav-fill { fill: var(--neon); opacity: 0; transition: 0.2s; }
        .nav-group:hover .nav-fill { opacity: 0.15; }
        
        .nav-label-text { 
            font-size: 11px; 
            opacity: 1; 
            /* System-Schriftarten für Emojis erzwingen */
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
            fill: white;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1 style="font-size: 3.5rem; margin: 0; text-shadow: 0 0 10px var(--neon);">DART MASTER</h1>
    </header>

    <div class="board-container">
        <svg class="board-svg" viewBox="0 0 200 200">
            <g transform="translate(100,100)">
                
                <g id="hit-layer">
                    <defs>
                        <path id="btn-path" d="M-8.8,-56 A56,56 0 0,1 8.8,-56 L13.2,-84 A84,84 0 0,0 -13.2,-84 Z" />
                    </defs>
                    
                    <g class="nav-group" onclick="location.href='training_stats.html'" transform="rotate(-36)">
                        <use xlink:href="#btn-path" class="nav-fill"/>
                        <text y="-68" class="nav-label-text" text-anchor="middle">&#x1F4CA;</text>
                    </g>
                    <g class="nav-group" onclick="location.href='training_hub.html'" transform="rotate(-18)">
                        <use xlink:href="#btn-path" class="nav-fill"/>
                        <text y="-68" class="nav-label-text" text-anchor="middle">&#x1F4AA;</text>
                    </g>
                    <g class="nav-group" onclick="location.href='game_501.html'" transform="rotate(0)">
                        <use xlink:href="#btn-path" class="nav-fill"/>
                        <text y="-68" class="nav-label-text" text-anchor="middle">&#x1F3AF;</text>
                    </g>
                    <g class="nav-group" onclick="location.href='career_hub.html'" transform="rotate(18)">
                        <use xlink:href="#btn-path" class="nav-fill"/>
                        <text y="-68" class="nav-label-text" text-anchor="middle">&#x1F3C6;</text>
                    </g>
                    <g class="nav-group" onclick="location.href='settings.html'" transform="rotate(36)">
                        <use xlink:href="#btn-path" class="nav-fill"/>
                        <text y="-68" class="nav-label-text" text-anchor="middle">&#x2699;&#xFE0F;</text>
                    </g>
                </g>

                <g id="number-layer" pointer-events="none">
                    <text transform="rotate(-90) translate(0,-94)" class="num-text">11</text>
                    <text transform="rotate(-72) translate(0,-94)" class="num-text">14</text>
                    <text transform="rotate(-54) translate(0,-94)" class="num-text">9</text>
                    <text transform="rotate(-36) translate(0,-94)" class="num-text">12</text>
                    <text transform="rotate(-18) translate(0,-94)" class="num-text">5</text>
                    <text transform="rotate(0) translate(0,-94)"   class="num-text">20</text>
                    <text transform="rotate(18) translate(0,-94)"  class="num-text">1</text>
                    <text transform="rotate(36) translate(0,-94)"  class="num-text">18</text>
                    <text transform="rotate(54) translate(0,-94)"  class="num-text">4</text>
                    <text transform="rotate(72) translate(0,-94)"  class="num-text">13</text>
                    <text transform="rotate(90) translate(0,-94)"  class="num-text">6</text>
                </g>

                <g class="spider-grid" pointer-events="none">
                    <circle r="92" class="spider-line"/><circle r="92" class="spider-core"/>
                    <circle r="84" class="spider-line"/><circle r="84" class="spider-core"/>
                    <circle r="56" class="spider-line"/><circle r="56" class="spider-core"/>
                    <circle r="50" class="spider-line"/><circle r="50" class="spider-core"/>
                    <circle r="12.7" class="spider-line"/><circle r="12.7" class="spider-core"/>

                    <g id="spokes">
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(-99)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(-81)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(-63)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(-45)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(-27)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(-9)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(9)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(27)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(45)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(63)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(81)"/>
                        <line x1="0" y1="-12.7" x2="0" y2="-92" class="spider-line" transform="rotate(99)"/>
                    </g>
                </g>
            </g>
        </svg>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
