<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDC Karriere - Spielerwahl</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .selection-container { padding: 20px; }
        .selection-list { 
            max-height: 80vh; 
            overflow-y: auto; 
            border-radius: 15px; 
            background: #2f3542; 
            border: 1px solid rgba(255,255,255,0.1); 
            margin-top: 10px;
        }
        .player-row { 
            display: grid; 
            grid-template-columns: 50px 1fr 100px; 
            padding: 12px 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .player-row:hover { background: #3d4656; transform: scale(1.01); }
        .rank { font-weight: bold; color: var(--accent); display: flex; align-items: center; }
        .name-info { display: flex; flex-direction: column; }
        .name-info small { opacity: 0.5; font-size: 0.75rem; }
        .money { text-align: right; font-family: monospace; font-weight: bold; align-self: center; }
        
        /* Suchfeld-Style */
        .search-box {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--panel);
            background: var(--secondary);
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="selection-container">
            <h2 style="color: var(--accent); text-align: center; margin-bottom: 5px;">PROFI WÄHLEN</h2>
            <p style="text-align: center; opacity: 0.6; font-size: 0.9rem; margin-bottom: 20px;">Wähle deine Identität für die Saison 2026</p>
            
            <input type="text" id="playerSearch" class="search-box" placeholder="Spieler suchen..." onkeyup="filterPlayers()">

            <div id="player-list" class="selection-list">
                </div>

            <button class="btn-ctrl btn-start" onclick="window.location.href='index.html'" style="background: #3d4656; margin-top: 20px;">ZURÜCK</button>
        </div>
    </div>

    <script src="player_db.js"></script>
    <script>
        function renderList(filter = "") {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            
            // Falls player_db.js nicht geladen wurde oder leer ist
            if (typeof ALL_PLAYERS === 'undefined') {
                list.innerHTML = '<p style="padding:20px; text-align:center;">Datenbank-Fehler!</p>';
                return;
            }

            ALL_PLAYERS.forEach((p) => {
                if (p.n.toLowerCase().includes(filter.toLowerCase())) {
                    const row = document.createElement('div');
                    row.className = 'player-row';
                    row.innerHTML = `
                        <span class="rank">${p.r}</span>
                        <div class="name-info">
                            <span style="font-weight:600;">${p.n}</span>
                            <small>${p.c} • Basis-Avg: ${p.a}</small>
                        </div>
                        <span class="money">£${p.m.toLocaleString()}</span>
                    `;
                    row.onclick = () => selectPlayer(p);
                    list.appendChild(row);
                }
            });
        }

        function filterPlayers() {
            const val = document.getElementById('playerSearch').value;
            renderList(val);
        }

        function selectPlayer(p) {
            const careerState = {
                name: p.n,
                money: p.m,
                rank: p.r,
                baseAvg: p.a,
                isCareer: true,
                currentTournamentIndex: 0
            };
            localStorage.setItem('career_player', JSON.stringify(careerState));
            alert(`Du spielst jetzt als ${p.n}! Viel Erfolg in der Saison 2026.`);
            window.location.href = 'career_hub.html';
        }

        window.onload = () => renderList();
    </script>
</body>
</html>
