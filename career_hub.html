<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDC Career Management</title>
    <style>
        :root {
            --sidebar-width: 80px;
            --accent: #2ecc71;
            --bg: #0f1116;
            --card-bg: #1c1f26;
            --text-gray: rgba(255,255,255,0.5);
            --gold: #f1c40f;
            --danger: #ff4757;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar-Platzhalter */
        #sidebar-container {
            width: var(--sidebar-width);
            height: 100vh;
            background: #07080a;
            flex-shrink: 0;
        }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        .header-flex {
            display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;
        }

        .dashboard-grid {
            display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 20px;
        }

        .hero-card {
            background: linear-gradient(135deg, #145c32, #0f1116);
            border-radius: 24px; padding: 40px; position: relative;
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 250px; border: 1px solid rgba(46, 204, 113, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-box span { font-size: 0.7rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        .stat-box div { font-size: 1.3rem; font-weight: bold; margin-top: 5px; color: #fff; }

        .btn-play {
            background: var(--accent); color: #000; border: none; padding: 16px 45px;
            border-radius: 14px; font-weight: 900; cursor: pointer; font-size: 1.1rem;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-play:hover { transform: scale(1.05); background: #fff; box-shadow: 0 0 20px rgba(46, 204, 113, 0.6); }

        .highlight-green { color: var(--accent); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1c1f26; padding: 40px; border-radius: 24px; border: 1px solid var(--accent);
            text-align: center; max-width: 420px; width: 90%;
        }
        .modal-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .btn-modal { padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-modal.primary { background: var(--accent); color: #000; }
        .btn-modal.secondary { background: rgba(255,255,255,0.1); color: white; }
        
        .sidebar {
    width: var(--sidebar-width);
    background: #07080a;
    display: flex;
    flex-direction: column; /* Sorgt daf©╣r, dass sie UNTEREINANDER stehen */
    align-items: center;    /* Zentriert die Icons horizontal */
    padding: 20px 0;
    height: 100vh;
    border-right: 1px solid rgba(255,255,255,0.05);
}

.nav-icon {
    width: 50px;
    height: 50px;
    margin-bottom: 20px;
    display: flex;         /* Macht das Icon im Button zentriert */
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    text-decoration: none; 
    font-size: 1.5rem;     /* Die Grü0ŗ2ü0ē8e der Emojis */
    transition: 0.3s;
}

.nav-icon.active {
    background: var(--accent); /* Gr©╣ner Hintergrund f©╣r die aktive Seite */
    color: #000;
}

    </style>
</head>
<body>

    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="header-flex">
            <div>
                <h1 id="p-name" style="margin:0; font-size: 2.8rem; letter-spacing: -1px;">Lade...</h1>
                <div style="color: var(--accent); font-weight: bold; letter-spacing: 3px; font-size: 0.9rem;">WORLD RANK #<span id="p-rank">--</span></div>
            </div>
            <div style="text-align: right;">
                <span style="color: var(--text-gray); font-size: 0.8rem; text-transform: uppercase;">Stü0Ŗ1rke</span>
                <div style="font-size: 1.6rem; font-weight: bold; color: var(--accent);">ö9┴3 <span id="p-avg-display">--</span></div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="hero-card">
                <div>
                    <div style="background: rgba(46, 204, 113, 0.2); color: var(--accent); padding: 6px 18px; border-radius: 30px; display: inline-block; font-size: 0.75rem; font-weight: bold; border: 1px solid var(--accent);">
                        Nü0ć2CHSTES TURNIER
                    </div>
                    <h2 style="font-size: 2.6rem; margin: 20px 0 8px 0; color: #fff;" id="tournament-name">--</h2>
                    <p style="opacity: 0.8; font-size: 1.1rem;" id="tournament-info">Lade Details...</p>
                </div>
                <div>
                    <button class="btn-play" onclick="handleTournamentClick()">TURNIER SPIELEN</button>
                </div>
            </div>

            <div class="mini-grid">
                <div class="stat-box">
                    <span>Order of Merit</span>
                    <div id="p-money" class="highlight-green">ü0ä50</div>
                </div>
                <div class="stat-box">
                    <span>Vorschau</span>
                    <div id="p-defending" style="font-size: 0.9rem; color: var(--danger); margin-top: 8px;">Verteidigt: -ü0ä50</div>
                </div>
                <div class="stat-box">
                    <span>Nü0Ŗ1chste Station</span>
                    <div id="next-event-preview" style="font-size: 0.85rem; margin-top: 8px;">--</div>
                </div>
                <div class="stat-box">
                    <span>Trophü0Ŗ1en</span>
                    <div style="color: #f1c40f;" id="p-trophies">0</div>
                </div>
            </div>
        </div>
    </div>

    <div id="tournament-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2 style="color:var(--accent); margin: 0 0 10px 0;">Turnier fortsetzen?</h2>
            <p style="color: var(--text-gray); line-height: 1.5;">Ein angefangenes Turnier wurde gefunden.</p>
            <div class="modal-buttons">
                <button class="btn-modal primary" onclick="continueTournament()">FORTSETZEN</button>
                <button class="btn-modal secondary" onclick="confirmNewTournament()">NEU STARTEN</button>
                <button class="btn-modal" onclick="closeModal()" style="background:transparent; color:#888;">ABBRECHEN</button>
            </div>
        </div>
    </div>

<script src="sidebar_config.js"></script>
<script src="player_db.js"></script>
<script src="career_data.js"></script>
<script src="career_logic.js"></script>

<script>
    // Nur EINE window.onload Funktion!
    window.onload = () => {
        // 1. Sidebar einf©╣gen (aus sidebar_config.js)
        if (typeof injectSidebar === "function") {
            injectSidebar();
        }
        
        // 2. Hub-Daten laden
        updateHub();
    };

    function updateHub() {
        const allPlayers = JSON.parse(localStorage.getItem('pdc_world_players'));
        const careerPlayer = JSON.parse(localStorage.getItem('career_player'));
        
        if(!allPlayers || !careerPlayer) { 
            window.location.href = 'career_selection.html'; 
            return; 
        }

        const me = allPlayers.find(p => p.n === careerPlayer.name) || allPlayers[0];
        let currentIndex = parseInt(localStorage.getItem('pdc_career_index') || "0");
        
        document.getElementById('p-name').innerText = me.n;
        document.getElementById('p-rank').innerText = me.r || "--";
        document.getElementById('p-money').innerText = "ü0ä5" + (me.m || 0).toLocaleString();
        document.getElementById('p-avg-display').innerText = me.a ? me.a.toFixed(1) : "--";

        if (typeof PDC_TOUR_DATA !== 'undefined' && PDC_TOUR_DATA.calendar) {
            const currentEvent = PDC_TOUR_DATA.calendar[currentIndex];
            if(currentEvent) {
                document.getElementById('tournament-name').innerText = currentEvent.name;
                
                const date2024 = "2024" + currentEvent.date.substring(4);
                const defending = (me.history || [])
                    .filter(h => h.tId === currentEvent.id && h.date === date2024)
                    .reduce((sum, h) => sum + (h.prize || 0), 0);

                document.getElementById('p-defending').innerText = `Verteidigt: -ü0ä5${defending.toLocaleString()}`;
                document.getElementById('tournament-info').innerHTML = `Format: <b class="highlight-green">Best of ${currentEvent.bo} Legs</b>`;
            }

            const nextEvent = PDC_TOUR_DATA.calendar[currentIndex + 1];
            if(nextEvent) {
                document.getElementById('next-event-preview').innerText = nextEvent.name;
            }
        }
    }

    // Diese Funktionen in der career_hub.html ersetzen/ergü0Ŗ1nzen
function handleTournamentClick() {
    const existingBracket = JSON.parse(localStorage.getItem('current_bracket'));
    const currentIndex = parseInt(localStorage.getItem('pdc_career_index') || "0");
    const currentEvent = PDC_TOUR_DATA.calendar[currentIndex];

    // Pr©╣fen, ob ein gespeichertes Bracket zur aktuellen Event-ID passt
    if (existingBracket && existingBracket.eventId === currentEvent.id) {
        document.getElementById('tournament-modal').style.display = 'flex';
    } else {
        startFreshTournament();
    }
}

function startFreshTournament() {
    const currentIndex = parseInt(localStorage.getItem('pdc_career_index') || "0");
    const event = PDC_TOUR_DATA.calendar[currentIndex];
    
    // Altes Bracket entfernen, damit die Engine ein neues f©╣r dieses Event erstellt
    localStorage.removeItem('current_bracket'); 
    localStorage.setItem('current_tournament', JSON.stringify(event));
    
    window.location.href = 'tournament_view.html';
}

function continueTournament() { 
    window.location.href = 'tournament_view.html'; 
}

function confirmNewTournament() { 
    startFreshTournament(); 
}

function closeModal() { 
    document.getElementById('tournament-modal').style.display = 'none'; 
}

</script>

</body>
</html>
